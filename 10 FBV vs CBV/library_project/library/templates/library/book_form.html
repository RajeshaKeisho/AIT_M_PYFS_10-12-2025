<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body>

<h2>Add New Book</h2>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label>
    <input type="text" name="title"><br><br>

    <label>Author:</label>
    <input type="text" name="author"><br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price"><br><br>

    <button type="submit">Save</button>
</form>

</body>
</html>

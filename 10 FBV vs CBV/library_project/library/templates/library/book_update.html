<!DOCTYPE html>
<html>
<head>
    <title>Book Form</title>
</head>
<body>

<h2>Book Form</h2>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label>
    <input type="text" name="title"
           value="{{ book.title|default:'' }}"><br><br>

    <label>Author:</label>
    <input type="text" name="author"
           value="{{ book.author|default:'' }}"><br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price"
           value="{{ book.price|default:'' }}"><br><br>

    <button type="submit">Save</button>
</form>

</body>
</html>
